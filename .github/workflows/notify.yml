name: Notify about PR or Issue

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  notify-on-telegram:
    runs-on: ubuntu-latest
    env:
      telegram_to: ${{ secrets.TELEGRAM_TO }}
    steps:
      - name: Skip Telegram notification
        shell: bash
        if: ${{ env.telegram_to == '' }}
        run: |
          echo "Telegram SECRETS not defined, skip Telegram notification"

      - name: Notify on Telegram
        uses: appleboy/telegram-action@v1.0.1
        if: ${{ env.telegram_to != '' }}
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          disable_web_page_preview: true
          message: |
            New ${{ github.event_name }} created

            See details:
            ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || github.event.issue.html_url }}
