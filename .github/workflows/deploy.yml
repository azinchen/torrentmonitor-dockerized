name: Build and Deploy image

on:
  push:

env:
  PLATFORMS: "linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/riscv64"
  IMAGE_NAME: "torrentmonitor"

jobs:
  update_config_build_and_deploy:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if only .github files changed
        id: github_only
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/"* ]]; then
            # For push events on branches, check changed files
            if [[ -z "${{ github.event.before }}" ]]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep -v '^\.github/' || echo "")
              
              if [[ -z "${CHANGED_FILES}" ]]; then
                echo "Only .github files changed, skipping build and deploy"
                echo "skip=true" >> $GITHUB_OUTPUT
              else
                echo "skip=false" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get branch name
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        id: git
        shell: bash
        run: |
          IS_TAG=false
          if [[ ${GITHUB_REF} == *"/tags/"* ]]; then
            IS_TAG=true
          fi

          BRANCH_NAME=$(echo ${GITHUB_REF} | sed -e "s/.*\///g")

          if [[ ${BRANCH_NAME} == "master" ]]; then
            IMAGE_TAG="devel"
          else
            IMAGE_TAG=${BRANCH_NAME}
          fi

          # Set platforms: amd64 only for non-master branches, all platforms for master and tags
          if [[ ${BRANCH_NAME} != "master" && ${IS_TAG} == "false" ]]; then
            BUILD_PLATFORMS="linux/amd64"
          else
            BUILD_PLATFORMS="${{ env.PLATFORMS }}"
          fi

          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "is_tag=${IS_TAG}" >> $GITHUB_ENV
          echo "build_platforms=${BUILD_PLATFORMS}" >> $GITHUB_ENV
          echo "build_date=${BUILD_DATE}" >> $GITHUB_ENV

          echo "Action branch=${BRANCH_NAME} tag=${IS_TAG} ref=${GITHUB_REF} image_tag=${IMAGE_TAG} build_date=${BUILD_DATE} platforms=${BUILD_PLATFORMS}"

      - name: Login to DockerHub
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: ${{ env.build_platforms }}

      - name: Set up Docker Buildx
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}
        if: ${{ steps.github_only.outputs.skip != 'true' }}
        uses: docker/build-push-action@v7.1.0
        with:
          platforms: ${{ env.build_platforms }}
          push: true
          build-args: |
            DOCKERIZED_VERSION=${{ env.image_tag }}
            BUILD_DATE=${{ env.build_date }}
          tags: |
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}

      - name: Tag and push ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
        if: ${{ steps.github_only.outputs.skip != 'true' && env.is_tag == 'true' }}
        shell: bash
        run: |
          # Pull the previously built image and retag it as latest
          docker pull ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}
          docker tag ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }} ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

#      - name: Update repo description
#        if: ${{ env.is_tag == 'true' }}
#        uses: peter-evans/dockerhub-description@v3
#        with:
#          username: ${{ secrets.DOCKERHUB_USERNAME }}
#          password: ${{ secrets.DOCKERHUB_PASSWORD }}
#          repository: ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
#          short-description: ${{ github.event.repository.description }}

      - name: Skip Telegram notification
        shell: bash
        env:
          telegram_to: ${{ secrets.TELEGRAM_TO }}
        if: ${{ env.telegram_to == '' }}
        run: |
          echo "Telegram SECRETS not defined, skip Telegram notification"

      - name: Notify on Telegram
        uses: appleboy/telegram-action@v1.0.1
        env:
          telegram_to: ${{ secrets.TELEGRAM_TO }}
        if: ${{ steps.github_only.outputs.skip != 'true' && env.telegram_to != '' }}
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          disable_web_page_preview: true
          message: |
              New Docker image is built and pushed:
              ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}

              https://hub.docker.com/r/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
              ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.image_tag }}
